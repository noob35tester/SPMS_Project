version: "3.8"

services:
  postgres:
    image: postgres:16
    container_name: spms_postgres
    restart: always
    environment:
      POSTGRES_USER: spms_user
      POSTGRES_PASSWORD: spms_password
      POSTGRES_DB: spms_ibmp
    ports:
      - "5432:5432"
    volumes:
      - spms_postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: spms_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: noob35tester@gmail.com
      PGADMIN_DEFAULT_PASSWORD: Admin@123
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  spms_postgres_data:
